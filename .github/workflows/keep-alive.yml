name: Keep Supabase Alive

on:
  schedule:
    - cron: '0 8 * * 1'  # chaque lundi à 8h UTC
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          curl -s -X GET "https://mqobermcwxxxkbovizua.supabase.co/rest/v1/bacterio_systems?select=id&limit=1" \
            -H "apikey: ${{ secrets.VITE_SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.VITE_SUPABASE_ANON_KEY }}"
